<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#1a1a1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Chris Shu</title>
  <link rel="preconnect" href="https://fonts.cdnfonts.com">
  <link href="https://fonts.cdnfonts.com/css/audex" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='466 -33 1628 1667'><g transform='translate(-210.63 -364.11)' fill='%234a4a4f'><path d='M1674.77 364.11l-142.11 149.31 149.36 137.3 144.5-146.93z'/><path d='M1383.34 445.99s158.95 500.97 619 84.31c2.43 2.39 125.23 163.77 127.66 163.77-178.26 199.91-722.58 308.3-746.66-248.08z'/><path d='M959.39 1021.64l-110.78-199.91c566.83-380.56 873.51 168.58 464.87 416.7l132.48 52.99c158.18-6.49 135.44-194.57 303.49-346.84 63.43-76.3 512.22-176.64 522.67 464.87-26.23 582.12-711.37 541.93-597.35 0 40.13 209.15 195.2 217.57 316.81 161.91 184.1-86.04 180.87-229.9 181.61-288.22 1.81-143.17-67.22-350.26-245.53-222.96-91.49 65.32-95.52 136.49-113.21 171.01-17.65 34.53-73.44 169.2-313.12 127.66 223.61 462.34-146.69 585.1-183.03 592.53-93.9 47.26-665.64-3.86-604.6-739.46 48.98 385.37 242.74 591.24 551.62 513.03 233.82-59.18 232.82-480.13-127.66-342.02l-81.88-255.32c-3.48-10.83 115.98 30.38 238.44-2.39 99.43-26.61 181.6-220.89-79.5-221.61-114.4-.28-170.2 78.69-255.32 118.03z'/></g></svg>">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --w:340px;--h:214px;--r:16px;--p:24px;
      --metal:oklch(36% .01 260);--metal-dark:oklch(26% .01 260);--metal-light:oklch(46% .01 260);
      --txt:oklch(22% .008 260);
      --bg:radial-gradient(ellipse 120% 80% at 50% -20%,oklch(32% .008 260),oklch(24% .008 260) 35%,oklch(18% .008 260) 60%,oklch(14% .006 260))
    }
    @media(prefers-color-scheme:light){:root{--bg:radial-gradient(ellipse 120% 80% at 50% -20%,oklch(92% .005 260),oklch(88% .005 260) 35%,oklch(85% .005 260) 60%,oklch(82% .005 260))}}
    html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    body{font-family:Audex,system-ui,sans-serif;background:var(--bg);min-height:100dvh;display:grid;place-items:center;overflow:hidden;cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none}
    body:active{cursor:grabbing}
    .scene{perspective:1200px;opacity:0;animation:fade .6s ease forwards}
    .wrap{transform-style:preserve-3d;will-change:transform}
    .card{width:var(--w);height:var(--h);position:relative;transform-style:preserve-3d;cursor:grab}
    .card:active{cursor:grabbing}
    .face{position:absolute;inset:0;border-radius:var(--r);backface-visibility:hidden;background:linear-gradient(165deg,var(--metal-light),var(--metal) 30%,var(--metal) 70%,var(--metal-dark));box-shadow:inset 0 1px 1px rgba(255,255,255,.25),inset 0 -1px 1px rgba(0,0,0,.2),0 25px 50px -12px rgba(0,0,0,.5)}
    .face::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(165deg,rgba(255,255,255,.3),rgba(255,255,255,.08) 25%,transparent 50%,rgba(0,0,0,.05));pointer-events:none}
    .face::after{content:'';position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 0 0 1px rgba(255,255,255,.1);pointer-events:none}
    .front{transform:translateZ(2px)}.back{transform:rotateY(180deg) translateZ(2px)}
    .edge{position:absolute;inset:0;background:var(--metal-dark);border-radius:var(--r)}
    .ct{position:absolute;inset:0;padding:var(--p);pointer-events:none;display:flex;flex-direction:column;justify-content:space-between}
    .ct a{pointer-events:auto;text-decoration:none;cursor:pointer;transition:opacity .15s}
    .ct a:hover{opacity:.7}
    .row{display:flex;justify-content:space-between;align-items:center}
    .txt{color:var(--txt);text-shadow:0 1px 0 rgba(255,255,255,.2),0 -1px 0 rgba(0,0,0,.15);font-weight:400}
    .name{font-size:21px;letter-spacing:-.02em}
    .link{font-size:15px}
    .x{font-size:21px;width:32px;text-align:center}
    .icon{width:32px;height:32px;filter:drop-shadow(0 1px 0 rgba(255,255,255,.2))}
    .icon path{fill:var(--txt)}
    .bc{position:absolute;inset:0;display:flex;align-items:end;justify-content:center;padding-bottom:var(--p)}
    .year{font-size:13px;letter-spacing:.2em}
    @keyframes fade{to{opacity:1}}
    @media(prefers-reduced-motion:reduce){.scene{animation:none;opacity:1}}
    @media(max-width:400px){:root{--w:300px;--h:189px;--r:14px;--p:20px}.name{font-size:19px}.link{font-size:14px}.x{font-size:19px;width:28px}.year{font-size:12px}.icon{width:28px;height:28px}}
    @media(max-width:340px){:root{--w:270px;--h:170px;--r:12px;--p:16px}.name{font-size:17px}.link{font-size:13px}.x{font-size:17px;width:24px}.year{font-size:11px}.icon{width:24px;height:24px}}
  </style>
</head>
<body>
  <div class="scene"><div class="wrap" id="w"><div class="card">
    <div class="face front"><div class="ct">
      <div class="row">
        <span class="txt name">Chris Shu</span>
        <svg class="icon" viewBox="466 -33 1628 1667"><g transform="translate(-210.63 -364.11)"><path d="M1674.77 364.11l-142.11 149.31 149.36 137.3 144.5-146.93z"/><path d="M1383.34 445.99s158.95 500.97 619 84.31c2.43 2.39 125.23 163.77 127.66 163.77-178.26 199.91-722.58 308.3-746.66-248.08z"/><path d="M959.39 1021.64l-110.78-199.91c566.83-380.56 873.51 168.58 464.87 416.7l132.48 52.99c158.18-6.49 135.44-194.57 303.49-346.84 63.43-76.3 512.22-176.64 522.67 464.87-26.23 582.12-711.37 541.93-597.35 0 40.13 209.15 195.2 217.57 316.81 161.91 184.1-86.04 180.87-229.9 181.61-288.22 1.81-143.17-67.22-350.26-245.53-222.96-91.49 65.32-95.52 136.49-113.21 171.01-17.65 34.53-73.44 169.2-313.12 127.66 223.61 462.34-146.69 585.1-183.03 592.53-93.9 47.26-665.64-3.86-604.6-739.46 48.98 385.37 242.74 591.24 551.62 513.03 233.82-59.18 232.82-480.13-127.66-342.02l-81.88-255.32c-3.48-10.83 115.98 30.38 238.44-2.39 99.43-26.61 181.6-220.89-79.5-221.61-114.4-.28-170.2 78.69-255.32 118.03z"/></g></svg>
      </div>
      <div class="row">
        <a href="https://www.linkedin.com/in/shu/" target="_blank" rel="noopener" class="txt link">LinkedIn</a>
        <a href="https://x.com/cjsxyz" target="_blank" rel="noopener" class="txt x">𝕏</a>
      </div>
    </div></div>
    <div class="face back"><div class="bc"><span class="txt year">2026</span></div></div>
    <div class="edge"></div>
  </div></div></div>
  <script>
    const w=document.getElementById('w'),m=matchMedia('(prefers-reduced-motion:reduce)');
    let d=0,px=0,py=0,rx=0,ry=0,vx=0,vy=0,af;
    const up=()=>w.style.transform=`rotateX(${rx}deg)rotateY(${ry}deg)`,
      go=(x,y)=>{d=1;px=x;py=y;vx=vy=0;af&&cancelAnimationFrame(af)},
      mv=(x,y)=>{if(!d)return;vx=x-px;vy=y-py;ry+=vx*.4;rx-=vy*.4;px=x;py=y;up()},
      en=()=>{if(!d||m.matches)return;d=0;const s=()=>{vx*=.92;vy*=.92;ry+=vx*.4;rx-=vy*.4;up();(Math.abs(vx)>.05||Math.abs(vy)>.05)&&(af=requestAnimationFrame(s))};s()};
    onmousedown=e=>go(e.clientX,e.clientY);
    onmousemove=e=>mv(e.clientX,e.clientY);
    onmouseup=onmouseleave=en;
    ontouchstart=e=>e.touches[0]&&go(e.touches[0].clientX,e.touches[0].clientY);
    ontouchmove=e=>{e.touches[0]&&mv(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault()};
    ontouchend=en;
  </script>
</body>
</html>
